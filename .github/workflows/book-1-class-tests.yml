name: Book 1 — class gate tests

on:
  push:
    paths:
      - "agent-engineering-book/**"
      - ".github/workflows/book-1-class-tests.yml"
  pull_request:
    paths:
      - "agent-engineering-book/**"
      - ".github/workflows/book-1-class-tests.yml"

jobs:
  # The single command a human runs locally (`make verify`), run here
  # unmodified — this job IS the authority, not an approximation of one.
  # Covers: manifest validity + required artifacts, shared-test sync,
  # stray/secret files, broken relative links, class metadata consistency,
  # and the full pytest suite (schema validation, cross-file integrity,
  # permission-deny rules, candidate-account fit, proof-point expiry).
  verify:
    runs-on: ubuntu-latest
    outputs:
      classes: ${{ steps.load.outputs.classes }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root dev dependencies
        working-directory: agent-engineering-book
        run: pip install -e ".[dev]"

      - name: make verify
        working-directory: agent-engineering-book
        run: make verify

      - id: load
        name: Load the class list for the per-class matrix below (from the manifest)
        run: |
          classes=$(python3 -c "
          import yaml, json
          m = yaml.safe_load(open('agent-engineering-book/book-1-foundations/manifest.yaml'))
          print(json.dumps([c['id'] for c in m['implemented_classes']]))
          ")
          echo "classes=$classes" >> "$GITHUB_OUTPUT"
          echo "Manifest-registered classes: $classes"

  # Proves each class folder is genuinely self-sufficient: fresh checkout,
  # cd into just that folder, install only *its* requirements-dev.txt (not
  # the root's), run its tests. `verify` above runs pytest from the book
  # root with the root pyproject's deps already present, which wouldn't
  # catch a class folder missing something from its own requirements-dev.txt.
  per-class-self-sufficiency:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        class: ${{ fromJson(needs.verify.outputs.classes) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies for ${{ matrix.class }}
        working-directory: agent-engineering-book/book-1-foundations/${{ matrix.class }}
        run: pip install -r requirements-dev.txt

      - name: Run gate tests for ${{ matrix.class }} standalone
        working-directory: agent-engineering-book/book-1-foundations/${{ matrix.class }}
        run: python -m pytest tests/ -v
